<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Travel Engine</title>
    <style>
        :root {
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #f9fafb;
            color: #111827;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        button:hover {
            background: #1d4ed8;
        }

        .loader {
            display: none;
            text-align: center;
            font-style: italic;
            color: #6b7280;
        }

        .day-card {
            border-left: 4px solid #2563eb;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>✈️ Vibe Travel Engine</h1>
        <p>Dynamic planning powered by Gemini.</p>
    </header>

    <div class="card">
        <form id="travelForm">
            <div class="form-group">
                <label for="destination">Where to?</label>
                <input type="text" id="destination" required placeholder="e.g., Tokyo, Japan" aria-label="Destination">
            </div>
            <div class="form-group">
                <label for="days">How many days?</label>
                <input type="number" id="days" required min="1" max="14" value="3" aria-label="Number of days">
            </div>
            <div class="form-group">
                <label for="vibe">What's the vibe?</label>
                <input type="text" id="vibe" required placeholder="e.g., Cyberpunk, Foodie, Relaxing"
                    aria-label="Trip Vibe">
            </div>
            <div class="form-group">
                <label for="budget">Budget constraint?</label>
                <select id="budget" aria-label="Budget Constraint">
                    <option value="Backpacker (Under $50/day)">Backpacker</option>
                    <option value="Standard ($150/day)">Standard</option>
                    <option value="Luxury ($500+/day)">Luxury</option>
                </select>
            </div>
            <button type="submit">Generate Experience</button>
        </form>
    </div>

    <div id="loader" class="loader" aria-live="polite">Processing your vibe via Vertex AI...</div>

    <div id="results" class="card" style="display: none;" aria-live="polite">
        <h2 id="summary-title">Your Itinerary</h2>
        <p id="summary-text"></p>
        <div id="itinerary-days"></div>
    </div>

    <script>
        document.getElementById('travelForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            loader.style.display = 'block';
            results.style.display = 'none';

            const payload = {
                destination: document.getElementById('destination').value,
                days: parseInt(document.getElementById('days').value),
                vibe: document.getElementById('vibe').value,
                budget: document.getElementById('budget').value
            };

            try {
                const response = await fetch('/api/generate-itinerary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('summary-text').innerText = data.data.trip_summary;

                    const daysContainer = document.getElementById('itinerary-days');
                    daysContainer.innerHTML = ''; // Clear previous

                    data.data.daily_plan.forEach(day => {
                        daysContainer.innerHTML += `
                            <div class="day-card">
                                <h3>Day ${day.day}</h3>
                                <p><strong>Morning:</strong> ${day.morning_activity}</p>
                                <p><strong>Afternoon:</strong> ${day.afternoon_activity}</p>
                                <p><strong>Evening:</strong> ${day.evening_activity}</p>
                            </div>
                        `;
                    });

                    loader.style.display = 'none';
                    results.style.display = 'block';
                }
            } catch (error) {
                alert("Error generating itinerary. Check console.");
                console.error(error);
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
